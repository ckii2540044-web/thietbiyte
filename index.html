<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiết Bị Y Tế Kim Luyến</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .product-card { border: none; border-radius: 12px; background: #fff; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); height: 100%; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .product-card img { height: 200px; object-fit: contain; background: #fff; }
        .form-order { background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); margin-top: 50px; }
        .price { color: #d9534f; font-size: 1.2rem; font-weight: bold; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">✚ MEDISHOP</a>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="text-center mb-5 fw-bold">SẢN PHẨM NỔI BẬT CỦA CỬA HÀNG KIM LUYẾN</h2>
    <div class="row g-4">
        <div class="col-md-4 text-center">
            <div class="product-card">
                <img src="https://github.com/ckii2540044-web/thietbiyte/blob/main/omron.jpg" class="img-fluid rounded mb-3">
                <h5>Máy Đo Huyết Áp Omron</h5>
                <p class="price">1.250.000 VNĐ</p>
                <button class="btn btn-primary w-100" onclick="pick('Máy Đo Huyết Áp Omron')">ĐẶT MUA</button>
            </div>
        </div>
        <div class="col-md-4 text-center">
            <div class="product-card">
                <img src="https://github.com/ckii2540044-web/thietbiyte/blob/main/yuwell.png" class="img-fluid rounded mb-3">
                <h5>Máy Tạo Oxy Yuwell 5L</h5>
                <p class="price">9.800.000 VNĐ</p>
                <button class="btn btn-primary w-100" onclick="pick('Máy Tạo Oxy Yuwell 5L')">ĐẶT MUA</button>
            </div>
        </div>
        <div class="col-md-4 text-center">
            <div class="product-card">
                <img src="https://github.com/ckii2540044-web/thietbiyte/blob/main/nhietke.jpg" class="img-fluid rounded mb-3">
                <h5>Nhiệt Kế Hồng Ngoại</h5>
                <p class="price">550.000 VNĐ</p>
                <button class="btn btn-primary w-100" onclick="pick('Nhiệt Kế Hồng Ngoại')">ĐẶT MUA</button>
            </div>
        </div>
    </div>

    <div class="row justify-content-center mt-5" id="order-form">
        <div class="col-md-6 form-order">
            <h3 class="text-center mb-4 fw-bold text-primary">THÔNG TIN ĐẶT HÀNG</h3>
            <form action="https://docs.google.com/forms/d/e/1gMjajrtZulr-e1EV4FP1IaazWrnPA1U5gvK73vxhjxY/formResponse" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Sản phẩm:</label>
                    <input type="text" name="entry.316315849" id="p_field" class="form-control bg-light" readonly required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Họ và tên:</label>
                    <input type="text" name="entry.1742416399" class="form-control" placeholder="Nhập tên khách hàng" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Số điện thoại:</label>
                    <input type="tel" name="entry.728795551" class="form-control" placeholder="Ví dụ: 0912..." required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Địa chỉ:</label>
                    <textarea name="entry.1744185794" class="form-control" rows="2" placeholder="Số nhà, đường, phường/xã..." required></textarea>
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold py-2">XÁC NHẬN GỬI ĐƠN</button>
            </form>
        </div>
    </div>
</div>

<footer class="text-center py-4 text-muted small">
    © 2026 MediShop Việt Nam - Thiết bị y tế chuyên dụng
</footer>

<script>
    function pick(name) {
        document.getElementById('p_field').value = name;
        document.getElementById('order-form').scrollIntoView({ behavior: 'smooth' });
    }
</script>
</body>
</html>
